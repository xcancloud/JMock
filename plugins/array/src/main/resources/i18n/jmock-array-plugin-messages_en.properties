jmock.func.category.array=Array
# ======================== MRepeat Function ========================
jmock.func.MRepeat.description=Generate an array by repeating a value N times
jmock.func.MRepeat.parameter.value=The value to repeat
jmock.func.MRepeat.parameter.count=Number of repetitions, default 1
jmock.func.MRepeat.C1=Repeat a value N times
jmock.func.MRepeat.C2=Repeat a value once
# ======================== MSequence Function ========================
jmock.func.MSequence.description=Generate an arithmetic sequence array
jmock.func.MSequence.parameter.start=Start value, default 0
jmock.func.MSequence.parameter.step=Step value, default 1
jmock.func.MSequence.parameter.count=Number of elements to generate
jmock.func.MSequence.C1=Generate arithmetic sequence with start, step, and count
jmock.func.MSequence.C2=Generate arithmetic sequence with start and count (step=1)
jmock.func.MSequence.C3=Generate sequence from 0 to count-1
# ======================== MShuffle Function ========================
jmock.func.MShuffle.description=Randomly shuffle input items
jmock.func.MShuffle.parameter.items=Pipe-separated list of items to shuffle, e.g. a|b|c
jmock.func.MShuffle.C1=Shuffle the given items
# ======================== MSample Function ========================
jmock.func.MSample.description=Sample N unique items from input list without replacement
jmock.func.MSample.parameter.items=Pipe-separated list of items, e.g. a|b|c|d|e
jmock.func.MSample.parameter.count=Number of items to sample
jmock.func.MSample.C1=Sample N items from the given list
# ======================== MOneOf Function ========================
jmock.func.MOneOf.description=Randomly select one item from input list
jmock.func.MOneOf.parameter.items=Pipe-separated list of items, e.g. apple|banana|cherry
jmock.func.MOneOf.C1=Select one random item from the list
